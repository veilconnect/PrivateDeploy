name: Rolling Release

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "bridge/**"
      - "api/**"
      - "e2e/**"
      - "go.mod"
      - "go.sum"
      - "api/go.mod"
      - "api/go.sum"
      - ".github/workflows/rolling-release.yml"

  workflow_dispatch:

jobs:
  Quality-Gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    if: github.repository == 'veilconnect/PrivateDeploy'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Go tests (root)
        run: go test ./...

      - name: Go tests (api)
        run: cd api && go test ./...

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Frontend type-check
        run: cd frontend && pnpm run type-check

      - name: Frontend lint (ci)
        run: cd frontend && pnpm run lint:ci

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright Python package
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Cloud UI E2E regression
        run: python3 e2e/run_cloud_ui_e2e.py

      - name: Upload UI test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rolling-release-cloud-ui-e2e-artifacts
          path: output/playwright/

  Build:
    permissions: write-all
    runs-on: ubuntu-latest
    if: github.repository == 'veilconnect/PrivateDeploy'
    needs: Quality-Gate
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "latest"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        run: cd frontend && pnpm install --frozen-lockfile
      - name: Build Frontend
        run: cd frontend && pnpm build-only
      - name: Create a compressed file
        run: |
          git rev-parse --short HEAD | tr -d '\n' > frontend/dist/version.txt
          cd frontend
          mv dist rolling-release
          zip -r rolling-release.zip rolling-release
      - name: Generate Changelog
        run: |
          set +e
          LAST_COMMIT=$(curl -L https://github.com/veilconnect/PrivateDeploy/releases/download/rolling-release/version.txt)
          echo -e "## Change log\n\n> Update time: $(TZ='Asia/Shanghai' date "+%Y-%m-%d %H:%M:%S")\n" > changelog.md
          git log $LAST_COMMIT..HEAD --pretty=format:"* %s" >> changelog.md
          if [ $? -ne 0 ]; then
            echo "No changes found since last commit." >> changelog.md
          fi
          set -e
      - name: Create Release and Upload Assets
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ./{frontend/{rolling-release.zip,rolling-release/version.txt},changelog.md}
          file_glob: true
          tag: rolling-release
          release_name: rolling-release
          overwrite: true
          draft: false
          prerelease: true
          body: |
            Rolling release built by GitHub Actions.
            To use this version, please install the "Rolling Release Assistant" plugin and enable "Enable Rolling Release" within the app.

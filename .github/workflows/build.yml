name: Build Desktop Apps

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'bridge/**'
      - 'api/**'
      - 'e2e/**'
      - 'go.mod'
      - 'go.sum'
      - 'api/go.mod'
      - 'api/go.sum'
      - 'wails.json'
      - '.github/workflows/build.yml'
      - '!mobile/**'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'bridge/**'
      - 'api/**'
      - 'e2e/**'
      - 'go.mod'
      - 'go.sum'
      - 'api/go.mod'
      - 'api/go.sum'
      - 'wails.json'
      - '.github/workflows/build.yml'
      - '!mobile/**'
  workflow_dispatch:

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Go tests (root)
        run: go test ./...

      - name: Go tests (api)
        run: cd api && go test ./...

      - name: Go vulnerability check (root)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Go vulnerability check (api)
        run: cd api && govulncheck ./...

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Frontend type-check
        run: cd frontend && pnpm run type-check

      - name: Frontend lint (ci)
        run: cd frontend && pnpm run lint:ci

      - name: Frontend security audit
        run: cd frontend && pnpm audit --audit-level=high
        continue-on-error: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Playwright Python package
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Cloud UI E2E regression
        run: python3 e2e/run_cloud_ui_e2e.py

      - name: Upload UI test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cloud-ui-e2e-artifacts
          path: output/playwright/

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: quality-gate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            node: 20
          - os: macos-latest
            platform: darwin/universal
            node: 20
          - os: ubuntu-latest
            platform: linux/amd64
            node: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev libgtksourceview-3.0-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Verify environment
        run: wails doctor

      - name: Build application
        run: wails build -platform ${{ matrix.platform }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PrivateDeploy-${{ matrix.platform }}
          path: build/bin/

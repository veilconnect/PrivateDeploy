name: Mobile - Release APK

# Builds the release-signed Android APK and attaches it to the GitHub Release
# created for the same v* tag (desktop packages come from release.yml). Signing
# uses repository secrets — without them the workflow skips gracefully so it
# never ships an unsigned APK. Add these secrets (repo Settings → Secrets and
# variables → Actions) to enable it:
#   PRIVATEDEPLOY_ANDROID_KEYSTORE_BASE64  (base64 of the release .jks)
#   PRIVATEDEPLOY_ANDROID_KEY_ALIAS
#   PRIVATEDEPLOY_ANDROID_KEY_PASSWORD
#   PRIVATEDEPLOY_ANDROID_STORE_PASSWORD

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach the APK to (e.g. v2.0.2)"
        required: true

permissions:
  contents: write

defaults:
  run:
    working-directory: mobile

jobs:
  check-signing:
    name: Check signing secrets
    runs-on: ubuntu-latest
    # This job does not check out the repo, so the workflow-level
    # `working-directory: mobile` default would point at a nonexistent dir.
    defaults:
      run:
        working-directory: .
    outputs:
      signed: ${{ steps.c.outputs.signed }}
    steps:
      - id: c
        run: echo "signed=${{ secrets.PRIVATEDEPLOY_ANDROID_KEYSTORE_BASE64 != '' }}" >> "$GITHUB_OUTPUT"
      - if: steps.c.outputs.signed != 'true'
        run: echo "::warning::Android 签名密钥(PRIVATEDEPLOY_ANDROID_*)未配置;跳过 APK 发布。配置后重跑本工作流即可。"

  build-gomobile:
    name: Build Go Mobile AAR
    needs: check-signing
    if: needs.check-signing.outputs.signed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: mobile/gomobile/go.mod
      - uses: android-actions/setup-android@v3
      - run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init
      - run: echo "ANDROID_NDK_HOME=${ANDROID_NDK_LATEST_HOME:-$ANDROID_NDK_ROOT}" >> "$GITHUB_ENV"
      - name: Build AAR
        run: |
          cd gomobile
          chmod +x build-android.sh
          ./build-android.sh
      - uses: actions/upload-artifact@v4
        with:
          name: vpncore-aar-release
          path: mobile/android/app/libs/vpncore.aar
          retention-days: 1

  build-apk:
    name: Build signed APK + attach to release
    needs: [check-signing, build-gomobile]
    if: needs.check-signing.outputs.signed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.7'
          channel: 'stable'
          cache: true
      - uses: actions/download-artifact@v4
        with:
          name: vpncore-aar-release
          path: mobile/android/app/libs/
      - name: Decode release keystore
        run: echo "${{ secrets.PRIVATEDEPLOY_ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.jks"
      - run: flutter pub get
      - run: flutter pub run build_runner build --delete-conflicting-outputs
      - name: Build signed APKs (arm64 split + universal)
        env:
          PRIVATEDEPLOY_ANDROID_KEY_ALIAS: ${{ secrets.PRIVATEDEPLOY_ANDROID_KEY_ALIAS }}
          PRIVATEDEPLOY_ANDROID_KEY_PASSWORD: ${{ secrets.PRIVATEDEPLOY_ANDROID_KEY_PASSWORD }}
          PRIVATEDEPLOY_ANDROID_STORE_PASSWORD: ${{ secrets.PRIVATEDEPLOY_ANDROID_STORE_PASSWORD }}
          PRIVATEDEPLOY_ANDROID_STORE_FILE: ${{ runner.temp }}/release.jks
        run: |
          flutter build apk --release --split-per-abi
          flutter build apk --release
      - name: Stage APKs with friendly names
        run: |
          cd build/app/outputs/flutter-apk
          cp app-arm64-v8a-release.apk PrivateDeploy-android-arm64.apk
          cp app-release.apk PrivateDeploy-android-universal.apk
      - name: Remove stale single-name APK asset (migration from older releases)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete-asset "${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}" PrivateDeploy-android.apk -y || true
      - name: Attach APKs to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: |
            mobile/build/app/outputs/flutter-apk/PrivateDeploy-android-arm64.apk
            mobile/build/app/outputs/flutter-apk/PrivateDeploy-android-universal.apk

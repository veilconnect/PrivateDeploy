name: Mobile - Test and Analyze

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'mobile/**'
      - 'VERSION'
      - 'MOBILE_BUILD_NUMBER'
      - 'scripts/check_versions.sh'
      - 'scripts/sync_versions.sh'
      - '.github/workflows/mobile-test.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'mobile/**'
      - 'VERSION'
      - 'MOBILE_BUILD_NUMBER'
      - 'scripts/check_versions.sh'
      - 'scripts/sync_versions.sh'
      - '.github/workflows/mobile-test.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: mobile

jobs:
  version-consistency:
    name: Version Consistency
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check shared version metadata
        run: bash scripts/check_versions.sh
        # Override the job-level `working-directory: mobile` default — the
        # version scripts live at the repo root, not under mobile/.
        working-directory: ${{ github.workspace }}

  analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    needs: version-consistency

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.7'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Run code generation
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Analyze code
        run: flutter analyze

      - name: Check formatting
        run: dart format --set-exit-if-changed .

  test:
    name: Flutter Test
    runs-on: ubuntu-latest
    needs: version-consistency

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.7'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Run code generation
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Run tests
        run: flutter test --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false

  integration-test:
    name: Integration Tests
    # macOS runner 10× 计费;仅手动触发时跑,避免每次 push/PR 烧光免费额度。
    # ubuntu 上的单元测试/版本一致性等仍随 push/PR 正常跑。
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    needs: version-consistency
    strategy:
      matrix:
        device:
          - "iPhone 15 Pro"
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.7'
          channel: 'stable'
          cache: true

      - name: List available simulators
        run: xcrun simctl list devices

      - name: Start iOS Simulator
        run: |
          UDID=$(xcrun simctl create test-iphone com.apple.CoreSimulator.SimDeviceType.iPhone-15-Pro com.apple.CoreSimulator.SimRuntime.iOS-17-0)
          xcrun simctl boot $UDID
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV

      - name: Get dependencies
        run: flutter pub get

      - name: Run integration tests
        run: flutter test integration_test
        continue-on-error: true

      - name: Shutdown simulator
        if: always()
        run: xcrun simctl shutdown $SIMULATOR_UDID

  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    needs: version-consistency

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.7'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Check for outdated packages
        run: flutter pub outdated
        continue-on-error: true

      # NOTE: the previous `dart_code_metrics:metrics check-unused-files` step
      # was removed — dart_code_metrics is discontinued and isn't a project
      # dependency, so the step always failed with "Could not find package".
      # `flutter analyze` (in the Analyze job) already covers static checks.

      - name: Security audit
        run: |
          echo "Running security audit..."
          flutter pub run dependency_validator
        continue-on-error: true

name: Secret Scan

# Catches credentials/keys committed to the repo. Runs on ubuntu only (free
# tier). Uses .gitleaks.toml at the repo root for the ruleset + allowlist.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so PR/push commit ranges resolve correctly.
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Personal (non-org) repo: no GITLEAKS_LICENSE required.
          GITLEAKS_CONFIG: .gitleaks.toml

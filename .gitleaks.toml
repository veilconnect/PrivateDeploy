# gitleaks config for PrivateDeploy — extends the default ruleset and allowlists
# known non-secrets so the CI secret scan only fails on genuinely new leaks.
[extend]
useDefault = true

[allowlist]
description = "Docs examples, UI placeholders, and test fixtures — verified non-secrets."
# File paths whose matches are illustrative only (curl `Bearer YOUR_API_KEY`
# examples in docs, `-----BEGIN OPENSSH PRIVATE KEY-----` UI placeholders, and
# dummy keys/tokens in tests). Keep this list tight — do NOT add production code.
paths = [
  '''docs/.*''',
  '''.*_test\.dart$''',
  '''.*\.test\.ts$''',
  '''.*\.spec\.ts$''',
  '''e2e/.*''',
  '''frontend/src/views/CloudView/components/SSHConfigForm\.vue$''',
  '''frontend/src/views/WizardView/components/StepCredentials\.vue$''',
]
# Obvious placeholder/variable tokens that should never count as secrets.
regexes = [
  '''YOUR_API_KEY''',
  '''\$\{?[A-Z_]+\}?''',
  '''abcd1234efgh''',
]

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PrivateDeploy Logo Preview</title>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #172033; background: #f5f7fb; }
    main { max-width: 920px; margin: 0 auto; padding: 40px 28px; }
    h1 { margin: 0 0 8px; font-size: 24px; font-weight: 700; letter-spacing: 0; }
    p { margin: 0 0 28px; color: #566070; }
    .row { display: flex; align-items: end; gap: 28px; flex-wrap: wrap; padding: 28px; background: white; border: 1px solid #dce2ee; border-radius: 8px; }
    .item { display: grid; gap: 10px; justify-items: center; min-width: 88px; }
    .label { font-size: 13px; color: #566070; }
    .dark { margin-top: 24px; background: #141820; border-color: #2d3544; }
    .dark .label { color: #c6ceda; }
    img { display: block; image-rendering: auto; }
  </style>
</head>
<body>
<main>
  <h1>PrivateDeploy Logo Preview</h1>
  <p>新版实体 PD 标识，按桌面、启动图标、favicon/通知栏常见尺寸预览。</p>
  <section class="row">
    <div class="item"><img src="../frontend/src/assets/logo.png" width="192" height="192" /><div class="label">192 px</div></div>
    <div class="item"><img src="../frontend/src/assets/logo.png" width="96" height="96" /><div class="label">96 px</div></div>
    <div class="item"><img src="../frontend/src/assets/logo.png" width="48" height="48" /><div class="label">48 px</div></div>
    <div class="item"><img src="../frontend/src/assets/logo.png" width="32" height="32" /><div class="label">32 px</div></div>
    <div class="item"><img src="../frontend/src/assets/logo.png" width="24" height="24" /><div class="label">24 px</div></div>
  </section>
  <section class="row dark">
    <div class="item"><img src="../frontend/src/assets/logo.png" width="96" height="96" /><div class="label">dark / 96 px</div></div>
    <div class="item"><img src="../frontend/src/assets/logo.png" width="48" height="48" /><div class="label">dark / 48 px</div></div>
    <div class="item"><img src="../frontend/src/assets/logo.png" width="32" height="32" /><div class="label">dark / 32 px</div></div>
    <div class="item"><img src="../frontend/src/assets/logo.png" width="24" height="24" /><div class="label">dark / 24 px</div></div>
  </section>
</main>
</body>
</html>
